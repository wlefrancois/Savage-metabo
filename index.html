<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Savage Metabo v5.2 Coach Upgrade</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
<header class="hero">
<div class="eyebrow">CARNIVORE COMMAND CENTER</div>
<h1>Savage Metabo</h1>
<div class="sub">Founder Edition v5.2 — Coach Upgrade</div>
</header>

<nav class="tabs">
<button class="tab active" data-tab="home">Home</button>
<button class="tab" data-tab="checkin">Check-In</button>
<button class="tab" data-tab="mission">Mission</button>
<button class="tab" data-tab="history">History</button>
</nav>

<section id="home" class="panel active">
<div class="card">
<div class="row"><span>Founder Discipline Score</span><strong id="score">0%</strong></div>
<div class="meter"><span id="meterFill"></span></div>
<div class="coachbox">
<div class="small">Wayne Protocol Active</div>
<div id="coachHome">Complete today’s check-in.</div>
</div>
</div>

<div class="grid">
<div class="card"><div class="small">Current Streak</div><div class="big" id="streak">0</div></div>
<div class="card"><div class="small">Rank</div><div class="big" id="rank">Rookie</div></div>
</div>

<div class="card">
<div class="small">Latest Weight</div>
<div class="big" id="weightStat">--</div>
</div>
</section>

<section id="checkin" class="panel">
<div class="card">
<div class="title">Daily Check-In</div>
<input id="weight" placeholder="Weight (187)">
<select id="sleep">
<option value="">Sleep Quality</option>
<option value="3">3 Rough</option>
<option value="5">5 Okay</option>
<option value="7">7 Solid</option>
<option value="9">9 Elite</option>
</select>
<select id="energy">
<option value="">Energy</option>
<option value="3">3 Low</option>
<option value="5">5 Average</option>
<option value="7">7 Strong</option>
<option value="9">9 Beast</option>
</select>
<select id="pain">
<option value="">Back / Knee Pain</option>
<option value="0">0 None</option>
<option value="2">2 Slight</option>
<option value="5">5 Manageable</option>
<option value="8">8 High</option>
</select>
<button id="saveBtn">Generate Mission</button>
<div id="saveStatus" class="ok"></div>
</div>
</section>

<section id="mission" class="panel">
<div class="card">
<div class="row"><span class="title">Today's Mission</span><span class="badge" id="missionType">READY</span></div>
<div id="missionLead" class="headline">Complete a check-in.</div>
<div id="missionTips"></div>
</div>
</section>

<section id="history" class="panel">
<div class="card">
<div class="title">History</div>
<div id="historyList"></div>
</div>
</section>
</div>
<script src="app.js"></script>
</body>
</html>
